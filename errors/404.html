<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found (404)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; padding: 40px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 72px; margin: 0; color: #3498db; }
        p { font-size: 18px; color: #666; margin-bottom: 20px; }
        .btn { display: inline-block; padding: 10px 25px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: #2980b9; }
        .search-hint { margin-top: 20px; font-size: 14px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Oops! Page Not Found</h2>
        <p>The page you're looking for might have been moved or deleted.</p>
        <a href="/" class="btn">Back to Homepage</a>
        <div class="search-hint">Double-check the URL or use the button above.</div>
    </div>
</body>
</html>
