<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied (403)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #333; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; padding: 40px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { font-size: 72px; margin: 0; color: #e74c3c; }
        p { font-size: 18px; color: #666; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 25px; background: #3498db; color: white; text-decoration: none; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: #2980b9; }
    </style>
</head>
<body>
    <div class="container">
        <h1>403</h1>
        <h2>Access Denied</h2>
        <p>Sorry, you don't have permission to view this directory.</p>
        <a href="/" class="btn">Return Home</a>
    </div>
</body>
</html>
